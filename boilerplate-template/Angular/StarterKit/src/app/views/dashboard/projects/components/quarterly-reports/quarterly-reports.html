<app-card-with-action bodyClass="p-0" title="Quarterly Reports" [isCloseable]="true" [isTogglable]="true" [isReloadable]="true">
  <span badge-text class="badge text-bg-primary">IN+</span>
  <div card-body>
    <div class="table-responsive">
      <table class="table table-custom table-nowrap table-hover table-centered mb-0">
        <thead class="bg-light bg-opacity-25 thead-sm">
          <tr class="text-uppercase fs-xxs">
            <th class="text-muted">Quarter</th>
            <th class="text-muted">Revenue</th>
            <th class="text-muted">Expense</th>
            <th class="text-muted">Margin</th>
            <th class="text-muted">•••</th>
          </tr>
        </thead>
        <tbody>
          @for (item of quarterlyReportData; track $index) {
          <tr>
            <td>
              <h5 class="fs-sm mb-1 fw-normal">{{item.quarter}}</h5>
              <span class="text-muted fs-xs">{{item.period}}</span>
            </td>
            <td>{{item.revenue}}</td>
            <td>{{item.expense}}</td>
            <td>{{item.margin}}</td>
            <td style="width: 60px">
              <div dir="ltr">
                @if (item.chartOptions) {
                <app-echart class="donut-chart" [getOptions]="item.chartOptions" height="30px" />
                }
              </div>
            </td>
          </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</app-card-with-action>
