<div class="px-4 py-3 border-end border-dashed">
  <div class="d-flex justify-content-between mb-3">
    <h4 class="card-title">Revenue</h4>
    <a [routerLink]="[]" class="link-reset text-decoration-underline fw-semibold link-offset-3">View Reports <iconify-icon icon="tabler:arrow-right"></iconify-icon></a>
  </div>

  <div class="row text-center mb-3">
    <div class="col">
      <div class="bg-light bg-opacity-50 p-2">
        <h5 class="m-0"><span class="text-muted">Total Revenue:</span>$ <span [countUp]="40"></span>M</h5>
      </div>
    </div>
    <div class="col">
      <div class="bg-light bg-opacity-50 p-2">
        <h5 class="m-0"><span class="text-muted">Total Orders: </span> <span [countUp]="50.9" [countUpOptions]="{decimalPlaces: 2}"></span>k</h5>
      </div>
    </div>
  </div>

  <div dir="ltr" class="position-relative">
    <div class="py-2 px-3 rounded-3 bg-light-subtle border text-primary z-1 position-absolute" style="top: 4.5%; left: 12%">
      <p class="mb-2 text-uppercase fs-xxs fw-semibold">Growth Rate</p>
      <h4 class="mb-0 fw-bold text-primary">89.24% <iconify-icon icon="tabler:trending-up"></iconify-icon></h4>
    </div>
    <app-echart [getOptions]="revenueChartOptions" height="252px" id="revenue-chart" />
  </div>
</div>
