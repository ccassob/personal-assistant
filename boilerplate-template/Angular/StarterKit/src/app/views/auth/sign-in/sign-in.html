<div class="auth-box overflow-hidden align-items-center d-flex">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-xxl-4 col-md-6 col-sm-8">
        <div class="auth-brand text-center mb-4">
          <a routerLink="/" class="logo-dark">
            <img src="assets/images/logo-black.png" alt="dark logo" />
          </a>
          <a routerLink="/" class="logo-light">
            <img src="assets/images/logo.png" alt="logo" />
          </a>
          <h4 class="fw-bold mt-3">Welcome</h4>
          <p class="text-muted w-lg-75 mx-auto">Let’s get you signed in. Enter your email and password to continue.</p>
        </div>

        <div class="card p-4">
          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="userEmail" class="form-label">
                Email address
                <span class="text-danger">*</span>
              </label>
              <div class="input-group">
                <input type="email" name="email" [(ngModel)]="email" class="form-control" id="userEmail" placeholder="you@example.com" required />
              </div>
            </div>

            <div class="mb-3">
              <label for="userPassword" class="form-label">
                Password
                <span class="text-danger">*</span>
              </label>
              <div class="input-group">
                <input type="password" name="password" [(ngModel)]="password" class="form-control" id="userPassword" placeholder="••••••••" required />
              </div>
            </div>

            @if(error){
            <p class="text-danger">{{ error }}</p>
            }

            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="form-check">
                <input class="form-check-input form-check-input-light fs-14" type="checkbox" id="rememberMe" />
                <label class="form-check-label" for="rememberMe">Keep me signed in</label>
              </div>
              <a routerLink="/auth/reset-pass" class="text-decoration-underline link-offset-3 text-muted">Forgot Password?</a>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary fw-semibold py-2">Sign In</button>
            </div>
          </form>

          <p class="text-muted text-center mt-4 mb-0">
            New here?
            <a routerLink="/auth/sign-up" class="text-decoration-underline link-offset-3 fw-semibold">Create an account</a>
          </p>
        </div>

        <p class="text-center text-muted mt-4 mb-0">
          © {{ currentYear }} {{ name }} — by
          <span class="fw-bold">{{ author }}</span>
        </p>
      </div>
    </div>
  </div>
</div>
