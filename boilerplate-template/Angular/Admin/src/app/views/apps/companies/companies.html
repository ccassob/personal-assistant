<div class="container-fluid">
  <app-page-breadcrumb title="Companies" subTitle="Apps"></app-page-breadcrumb>

  <div class="row mb-3">
    <div class="col-lg-12">
      <form class="bg-light-subtle rounded border p-3">
        <div class="row gap-3">
          <div class="col">
            <div class="row gap-3">
              <div class="col-lg-4">
                <div class="app-search">
                  <input type="text" class="form-control" placeholder="Search company name..." />
                  <app-icon icon="search" class="app-search-icon text-muted"></app-icon>
                </div>
              </div>
              <div class="col-auto">
                <div class="d-flex align-items-center gap-2">
                  <span class="me-2 fw-semibold">Filter By:</span>

                  <!-- Location Filter -->
                  <div class="app-search">
                    <select class="form-select form-control my-1 my-md-0">
                      <option selected>Location</option>
                      <option value="USA">USA</option>
                      <option value="Canada">Canada</option>
                      <option value="Germany">Germany</option>
                      <option value="India">India</option>
                      <option value="UK">United Kingdom</option>
                    </select>
                    <app-icon icon="map-pin" class="app-search-icon text-muted"></app-icon>
                  </div>

                  <!-- Category Filter -->
                  <div class="app-search">
                    <select class="form-select form-control my-1 my-md-0">
                      <option selected>Category</option>
                      <option value="Tech">Tech</option>
                      <option value="Finance">Finance</option>
                      <option value="eCommerce">eCommerce</option>
                      <option value="Healthcare">Healthcare</option>
                      <option value="Automotive">Automotive</option>
                    </select>
                    <app-icon icon="briefcase" class="app-search-icon text-muted"></app-icon>
                  </div>

                  <!-- Rating Filter -->
                  <div class="app-search">
                    <select class="form-select form-control my-1 my-md-0">
                      <option selected>Rating</option>
                      <option value="5">5 Stars</option>
                      <option value="4">4 Stars & Up</option>
                      <option value="3">3 Stars & Up</option>
                      <option value="2">2 Stars & Up</option>
                      <option value="1">1 Star & Up</option>
                    </select>
                    <app-icon icon="star" class="app-search-icon text-muted"></app-icon>
                  </div>

                  <button type="submit" class="btn btn-secondary">Apply</button>
                </div>
              </div>
            </div>
          </div>

          <div class="col-auto">
            <div role="group" aria-label="Layout toggle button group">
              <input type="radio" class="btn-check" name="btnradio" id="btnradio1" checked />
              <label class="btn btn-soft-primary btn-icon me-1" for="btnradio1">
                <app-icon icon="category" class="fs-lg"></app-icon>
              </label>

              <input type="radio" class="btn-check" name="btnradio" id="btnradio2" />
              <label class="btn btn-soft-primary btn-icon" for="btnradio2">
                <app-icon icon="list-check" class="fs-lg"></app-icon>
              </label>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="row">
    @for(company of companyData;track $index){
    <div class="col-xl-4 col-md-6">
      <app-company-card [company]="company"></app-company-card>
    </div>
    }
  </div>

  <ul class="pagination pagination-rounded pagination-boxed justify-content-center">
    <ngb-pagination [page]="1" [collectionSize]="50" />
  </ul>
</div>
