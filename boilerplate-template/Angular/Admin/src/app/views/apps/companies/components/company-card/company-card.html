<div class="card d-flex flex-row p-3">
  <img [src]="company.image" [alt]="company.name" class="avatar-xl me-3" />
  <!-- Header -->
  <div class="flex-grow-1">
    <div class="d-flex justify-content-between align-items-start">
      <div>
        <h4 class="mb-1 fw-bold">{{ company.name }}</h4>
        <a [href]="'https://' + company.website" class="text-muted text-decoration-none" target="_blank">{{ company.website }}</a>
      </div>
      <a [routerLink]="[]" class="btn btn-sm btn-outline-danger rounded-pill"> <app-icon icon="heart" class="me-1"></app-icon> Follow </a>
    </div>

    <!-- Badges -->
    <div class="mt-2 mb-3 d-flex flex-wrap gap-2">
      <span class="badge bg-light text-primary p-1 fs-xxs"> <app-icon icon="map-pin" class="me-1"></app-icon>{{ company.location }}</span>
      <span class="badge bg-light text-success p-1 fs-xxs">{{ company.industry }}</span>
    </div>

    <!-- Description -->
    <p class="text-muted mb-3">{{ company.description }}</p>

    <!-- Stats -->
    <div class="d-flex justify-content-between flex-wrap mt-2 gap-3">
      <div>
        <h6 class="text-muted">Employees</h6>
        <span class="fw-semibold fs-lg">{{ company.employees }}</span>
      </div>
      <div>
        <h6 class="text-muted">Revenue</h6>
        <span class="fw-semibold fs-lg">{{ company.revenue }}</span>
      </div>

      <div class="text-warning align-self-center fs-lg">
        <app-rating [rate]="company.rating" />
      </div>
    </div>
  </div>
</div>
