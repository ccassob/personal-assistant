<div class="card">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <span class="avatar-xl d-block mb-1">
        <span class="avatar-title bg-light bg-opacity-75 rounded">
          <img [src]="card.image" [alt]="card.name" height="30" />
        </span>
      </span>

      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" [checked]="card.isActive" />
      </div>
    </div>

    <h5 class="card-title mb-1">{{ card.name }}</h5>

    <p class="card-text text-muted">{{ card.description }}</p>

    <div class="mb-2">
      @if (card.isFree) {
      <span class="badge badge-label text-bg-light me-2">Free</span>
      }@else{
      <span class="badge badge-label text-bg-warning me-2">
        <app-icon icon="medal"></app-icon>
        Premium
      </span>
      }

      <span class="badge badge-label text-bg-success">
        <app-icon icon="check"></app-icon>
        Connected
      </span>
    </div>

    <small class="text-muted d-block mb-3"> Last Sync: {{ card.lastSync }} </small>

    <div class="d-flex gap-2">
      <button class="btn btn-outline-danger w-50">Remove</button>
      <button class="btn btn-outline-primary w-50">Details</button>
    </div>
  </div>
</div>
