@for (task of taskData; track $index) {
<div class="card mb-1">
  <div class="card-body p-2">
    <div class="row g-3 align-items-center justify-content-between">
      <div class="col-md-6">
        <div class="d-flex align-items-center gap-2">
          <input type="checkbox" class="form-check-input rounded-circle mt-0 fs-xl" id="task{{ task.id }}" />
          <a [routerLink]="[]" role="button" class="link-reset fw-medium"> {{ task.title }} </a>
        </div>
      </div>
      <div class="col-md-6">
        <div class="d-flex align-items-center gap-3 justify-content-md-end">
          <div class="d-flex align-items-center gap-1">
            <div class="avatar avatar-xs">
              <img [src]="task.user.image" alt="avatar-{{ task.id }}" class="img-fluid rounded-circle" />
            </div>
            <div>
              <h5 class="text-nowrap mb-0 lh-base">
                <a [routerLink]="[]" class="link-reset">{{ task.user.name }}</a>
              </h5>
            </div>
          </div>

          <div class="flex-shrink-0">
            <span
              class="badge badge-label"
              [class]="
                                task.status === 'pending' ? 'text-bg-primary' :
                                task.status === 'delayed' ? 'text-bg-danger' :
                                task.status === 'completed' ? 'text-bg-success' :
                                task.status === 'in-progress' ? 'text-bg-warning' :
                                task.status === 'review' ? 'text-bg-info' :
                                'text-bg-secondary'
                            "
            >
              {{ toPascalCase(task.status) }}
            </span>
          </div>

          <ul class="list-inline fs-base text-end flex-shrink-0 mb-0">
            <li class="list-inline-item">
              <app-icon icon="calendar" class="text-muted fs-lg me-1 align-middle"></app-icon>
              <span class="fw-semibold">{{ task.time }}</span>
            </li>
            <li class="list-inline-item ms-1">
              <app-icon icon="list-details" class="text-muted fs-lg me-1 align-middle"></app-icon>
              <span class="fw-medium">{{ task.tasks.completed }}/{{ task.tasks.total }}</span>
            </li>
            <li class="list-inline-item ms-1">
              <app-icon icon="message" class="text-muted fs-lg me-1 align-middle"></app-icon>
              <span class="fw-medium">{{ task.comments }}</span>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
}
