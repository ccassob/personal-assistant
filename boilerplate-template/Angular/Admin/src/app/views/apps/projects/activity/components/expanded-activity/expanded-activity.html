<div class="card card-h-100">
  <div class="card-header">
    <h4 class="card-title">Expended Activity Stream</h4>
  </div>

  <div class="card-body">
    <div class="timeline timeline-icon-bordered">
      @for (item of expandedActivityData; track $index) {

      <div class="timeline-item d-flex align-items-stretch">
        <div class="timeline-dot">
          <app-icon [icon]="item.icon" class="fs-xl" [ngClass]="item.iconClassName"></app-icon>
        </div>

        <div class="timeline-content ps-3 pb-3">
          <div class="d-flex justify-content-between">
            <h5 class="mb-1">
              {{ item.title }}
              <span class="badge badge-label ms-2 {{ item.badge.className }}"> {{ item.badge.label }} </span>
            </h5>
            <span class="text-muted fs-xs">{{ item.time }}</span>
          </div>
          <p class="mb-1 text-muted">{{ item.description }}</p>
          <div class="d-flex align-items-center gap-2">
            <img [src]="item.user.image" [alt]="item.user.name" class="rounded-circle avatar-xxs" />
            <a [routerLink]="item.href" class="fw-semibold link-reset">{{ item.user.name }}</a>
          </div>
        </div>
      </div>

      }
    </div>
  </div>
</div>
