<div class="container-fluid">
  <app-page-breadcrumb title="Team Board" subTitle="Apps" />
  <div class="row justify-content-center">
    <div class="col-xxl-10">
      <div class="d-flex align-items-sm-center flex-sm-row flex-column mb-3">
        <div class="flex-grow-1">
          <h4 class="fs-xl mb-1">Manage Teams</h4>
          <p class="text-muted mb-0">Assign roles to streamline teamwork and secure access.</p>
        </div>

        <div class="text-end">
          <a [routerLink]="[]" class="btn btn-success">
            <app-icon icon="plus" class="me-1"></app-icon>
            Add New Team
          </a>
        </div>
      </div>

      <div class="row">
        @for (team of teamData; track $index;let i = $index) {
        <div class="col-md-6 col-lg-4">
          <app-team-board-card [team]="team" [index]="i" />
        </div>
        }
      </div>
    </div>
  </div>
</div>
