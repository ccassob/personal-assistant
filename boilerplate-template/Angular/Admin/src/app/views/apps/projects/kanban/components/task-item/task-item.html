<div class="card shadow border-light mb-2">
  <div class="card-body">
    <div class="d-flex align-items-center mb-2">
      <span class="badge p-1 badge-soft-{{item.category.variant}}">
        <app-icon icon="circle-filled"></app-icon>
        {{ item.category.name }}
      </span>
      <div class="ms-auto">
        <div ngbDropdown>
          <a [routerLink]="[]" ngbDropdownToggle class="btn btn-icon btn-sm btn-ghost-light text-muted drop-arrow-none">
            <app-icon icon="dots-vertical" class="fs-xl"></app-icon>
          </a>
          <ul ngbDropdownMenu class="dropdown-menu-end">
            <li>
              <a ngbDropdownItem [routerLink]="[]">
                <app-icon icon="share" class="me-2"></app-icon>
                Share
              </a>
            </li>
            <li>
              <a ngbDropdownItem [routerLink]="[]">
                <app-icon icon="edit" class="me-2"></app-icon>
                Edit
              </a>
            </li>
            <li>
              <a ngbDropdownItem [routerLink]="[]">
                <app-icon icon="ban" class="me-2"></app-icon>
                Block
              </a>
            </li>
            <li>
              <a ngbDropdownItem class="text-danger" [routerLink]="[]">
                <app-icon icon="trash" class="me-2"></app-icon>
                Delete
              </a>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <h5 class="mb-3">
      <a [routerLink]="[]" class="link-reset">{{item.title}}</a>
    </h5>

    @if (item.image) {
    <div class="mb-3">
      <img [src]="item.image" alt="" class="rounded img-fluid" />
    </div>
    }

    <div class="d-flex justify-content-between">
      <div class="avatar-group avatar-group-xs">
        @for (user of item.users; track i; let i = $index) {
        <div class="avatar">
          <img [src]="user" alt="" class="rounded-circle avatar-xs" />
        </div>
        }
      </div>
      <div class="d-flex align-items-center gap-2">
        <app-icon icon="calendar-clock" class="text-muted fs-lg"></app-icon>
        <h5 class="fs-base mb-0 fw-medium">{{ item.date }}</h5>
      </div>
    </div>
    @if (item.progress) {
    <div class="mt-3">
      <div class="d-flex align-items-center justify-content-between mb-2">
        <p class="mb-0 text-muted fw-semibold fs-xxs">Progress</p>
        <p class="fw-semibold mb-0">{{item.progress}}%</p>
      </div>
      <ngb-progressbar [value]="item.progress" [type]="item.category.variant" [textType]="item.category.variant" style="height: 5px" />
    </div>
    }
  </div>
</div>
