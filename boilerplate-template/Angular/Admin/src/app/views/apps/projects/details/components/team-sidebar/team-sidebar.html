<div class="card card-h-100 rounded-0 rounded-end">
  <div class="card-body p-0">
    <div class="p-3 border-bottom border-dashed">
      <h5 class="mb-2">Status</h5>
      <div class="app-search">
        <select class="form-select form-control my-1 my-md-0">
          <option>Status</option>
          <option selected value="On Track">On Track</option>
          <option value="Delayed">Delayed</option>
          <option value="At Risk">At Risk</option>
          <option value="Completed">Completed</option>
        </select>
        <app-icon icon="calendar-clock" class="app-search-icon text-muted"></app-icon>
      </div>
    </div>

    <div class="p-3 border-bottom border-dashed">
      <div class="d-flex mb-3 justify-content-between align-items-center">
        <h5 class="mb-0">Team Members:</h5>
        <a [routerLink]="[]" class="btn btn-light btn-sm btn-icon rounded-circle">
          <app-icon icon="plus"></app-icon>
        </a>
      </div>

      @for(member of teamMemberData; track member.image; let last = $last) {
      <div class="d-flex justify-content-between align-items-center {{!last ? 'pb-2' : ''}}">
        <div class="d-flex align-items-center gap-2 {{!last ?'py-1':''}}">
          <div class="avatar avatar-sm">
            <img [src]="member.image" alt="avatar" class="img-fluid rounded-circle" />
          </div>
          <div>
            <h5 class="text-nowrap mb-0 lh-base">
              <a routerLink="member.href" class="link-reset">{{ member.name }}</a>
            </h5>
            <p class="text-muted fs-xxs mb-0">{{ member.role }}</p>
          </div>
        </div>
        <div>
          <a [routerLink]="[]" class="btn btn-sm btn-icon btn-default" title="Message">
            <app-icon icon="message" class="text-muted fs-lg"></app-icon>
          </a>
        </div>
      </div>
      }
    </div>

    <div class="px-3 pt-3 border-bottom border-dashed">
      <div class="d-flex mb-3 justify-content-between align-items-center">
        <h5 class="mb-0">Files:</h5>
        <a [routerLink]="[]" class="btn btn-light btn-sm btn-icon rounded-circle">
          <app-icon icon="plus"></app-icon>
        </a>
      </div>

      @for(file of fileData; track file.name) {
      <div class="d-flex justify-content-between align-items-center pb-2">
        <div class="d-flex align-items-center py-1 gap-2">
          <div class="flex-shrink-0 avatar-md bg-light bg-opacity-50 text-muted rounded-2 d-flex align-items-center justify-content-center">
            <app-icon [icon]="file.icon" class="fs-xl"></app-icon>
          </div>
          <div class="flex-grow-1">
            <h5 class="mb-1 fs-base">
              <a [routerLink]="[]" class="link-reset">{{ file.name }}</a>
            </h5>
            <p class="text-muted mb-0 fs-xs">{{ formatBytes(file.size)}}</p>
          </div>
        </div>
        <div>
          <a [routerLink]="[]" class="btn btn-sm btn-icon btn-default" title="Download">
            <app-icon icon="download" class="fs-lg"></app-icon>
          </a>
        </div>
      </div>
      }

      <div class="d-flex align-items-center justify-content-center gap-2 p-3">
        <strong>Loading...</strong>
        <div class="spinner-border spinner-border-sm text-danger" role="status" aria-hidden="true"></div>
      </div>
    </div>
  </div>
</div>
