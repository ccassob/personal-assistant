<div class="card mb-0">
  <div class="card-body">
    <div class="d-flex gap-4 align-items-center">
      <div class="flex-grow-1">
        <p class="text-muted text-uppercase mb-2 fw-semibold">{{ post.category }}</p>
        <h4 class="fs-lg mb-2">
          <a routerLink="/other-apps/forum-post" class="link-reset">{{post.title}}</a>
        </h4>
        <p class="text-muted mb-0">{{post.description}}</p>
      </div>
    </div>
  </div>
  <div class="card-footer">
    <p class="d-flex flex-wrap gap-3 text-muted mb-0 align-items-center justify-content-between fs-sm">
      <span class="d-flex align-items-center gap-2">
        <img [src]="post.author.image" alt="avatar-1" class="img-fluid avatar-sm rounded" />
        <span>
          <a [routerLink]="[]" class="link-dark fw-semibold lh-sm d-block">{{ post.author.name }}</a>
          <span class="text-muted small">{{ post.timeStamp }}</span>
        </span>
      </span>
      <span class="d-flex align-items-center gap-1"><app-icon icon="messages"></app-icon> <a [routerLink]="[]" class="link-reset">Answers: {{ post.answers }}</a></span>
      <span class="d-flex align-items-center gap-1"><app-icon icon="clock"></app-icon> Ends in: {{ post.timeLeft }}</span>
      <span class="d-flex align-items-center gap-1"><app-icon icon="users"></app-icon> Votes: {{ post.votes }}</span>
      <span class="d-flex align-items-center gap-1"><span class="badge {{post.badge.className}}">{{post.badge.text}}</span></span>
    </p>
  </div>
</div>
