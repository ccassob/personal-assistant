<div class="card h-100 mb-0 border-end-0 rounded-end-0">
  <div class="card-header p-3 border-light card-bg d-block">
    <div class="d-flex gap-2">
      <div class="app-search flex-grow-1">
        <input [(ngModel)]="searchText" type="text" class="form-control bg-light-subtle border-light" placeholder="Search here..." />
        <app-icon icon="search" class="app-search-icon text-muted"></app-icon>
      </div>
      <a [routerLink]="[]" class="btn btn-dark btn-icon">
        <app-icon icon="pencil" class="fs-xl"></app-icon>
      </a>
    </div>
  </div>

  <ngx-simplebar class="card-body p-2" style="height: calc(100% - 100px)" data-simplebar-md>
    <div class="list-group list-group-flush chat-list">
      @for(user of getFilteredUsers(); track user.id) {
      <a [routerLink]="[]" [class.active]="user.id === activeChatId" (click)="selectChat(user.id)" class="list-group-item list-group-item-action d-flex gap-2 justify-content-between">
        <span class="d-flex justify-content-start align-items-center gap-2 overflow-hidden">
          @if(!user.image) {
          <span class="avatar-sm flex-shrink-0">
            <span class="avatar-title fw-bold rounded-circle text-bg-primary"> {{ generateInitials(user.name) }} </span>
          </span>
          } @if(user.image) {
          <span class="avatar avatar-sm flex-shrink-0">
            <img [src]="user.image" alt="avatar" class="img-fluid rounded-circle" />
          </span>
          }
          <span class="overflow-hidden">
            <span class="text-nowrap fw-semibold fs-base mb-0 lh-base">{{ user.name }}</span>
            <span class="text-muted d-block fs-xs mb-0 text-truncate">{{ user.lastMessage }}</span>
          </span>
        </span>

        <span class="d-flex flex-column gap-1 justify-content-center flex-shrink-0 align-items-end">
          <span class="text-muted fs-xs">{{ user.timestamp }}</span>
          @if(user.unreadMessages) {
          <span class="badge text-bg-primary fs-xxs">{{ user.unreadMessages }}</span>
          }
        </span>
      </a>
      }
    </div>
  </ngx-simplebar>
</div>
