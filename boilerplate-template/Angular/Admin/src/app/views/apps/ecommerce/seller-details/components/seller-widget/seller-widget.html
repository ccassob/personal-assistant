<div class="card border-0  bg-opacity-10 {{item.cardBgColor}}">
  <div class="card-body">
    <h5 [attr.title]="item.title">{{ item.title }}</h5>

    <div class="d-flex align-items-center gap-2 my-3">
      <div class="avatar-md flex-shrink-0">
        <span class="avatar-title bg-opacity-90 rounded-circle fs-22" [class]="item.iconClassName">
          <app-icon [icon]="item.icon"></app-icon>
        </span>
      </div>
      <h3 class="mb-0" [countUp]="item.value" [countUpOptions]="{prefix: item.prefix || '', suffix : item.suffix || '', decimalPlaces: Number.isInteger(item.value) ? 0 : 1}"></h3>
    </div>
    <p class="mb-0">
      <span [class]="item.bulletClassName"><app-icon icon="circle-filled" class="me-1"></app-icon></span>
      <span class="text-nowrap text-muted">{{ item.subTitle }}</span>
      <span class="float-end"><b>{{ item.totalCount }}</b></span>
    </p>
  </div>
</div>
