<div class="card">
  <div class="card-header">
    <h4 class="card-title">Seller Overview</h4>
  </div>
  <div class="card-body">
    <div class="row row-cols-xxl-4 row-cols-md-2 row-cols-1 g-3 align-items-center">
      @for (item of sellerStatData; track $index) {
      <div class="col">
        <app-seller-widget [item]="item" />
      </div>
      }
    </div>
    <app-apexchart [getOptions]="getSellerChartOptions" />
  </div>
</div>
