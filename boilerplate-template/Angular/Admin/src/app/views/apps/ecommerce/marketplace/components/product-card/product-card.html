<article class="card card-h-100">
  <div class="badge badge-label fs-base rounded position-absolute top-0 start-0 m-3 text-bg-{{ product.discount >= 20 ? 'danger' : 'success' }}">{{ product.discount }}% OFF</div>

  <!-- Card Body -->
  <div class="card-body">
    <div class="p-3">
      <img [src]="product.image" [alt]="product.name" class="img-fluid" />
    </div>
    <h6 class="card-title fs-sm lh-base mb-2">
      <a routerLink="/apps/ecommerce/product-details" class="link-reset"> {{ product.name }}</a>
    </h6>

    <div>
      <span class="text-warning">
        <app-rating [rate]="product.rating" />
      </span>
      <span class="ms-1">
        <a routerLink="/apps/ecommerce/reviews" class="link-reset fw-semibold"> ({{ product.reviews }})</a>
      </span>
    </div>
  </div>

  <!-- Card footer -->
  <div class="card-footer bg-transparent d-flex justify-content-between border-dashed border-top">
    <div class="d-flex justify-content-start align-items-center gap-2">
      <h4 [class.text-success]="product.discount < 20" [class.text-danger]="product.discount >= 20" class="d-flex align-items-center gap-2 mb-0">
        <span class="text-muted text-decoration-line-through">${{ product.price.toFixed(2) }}</span>
        ${{ (product.price * (1 - product.discount / 100)).toFixed(2) }}
      </h4>
    </div>
    <a class="btn btn-sm btn-icon btn-primary" [routerLink]="[]">
      <app-icon icon="basket" class="fs-lg"></app-icon>
    </a>
  </div>
</article>
