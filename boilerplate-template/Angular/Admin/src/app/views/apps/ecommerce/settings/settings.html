<div class="container-fluid">
  <app-page-breadcrumb title="Shop Settings" subTitle="Ecommerce" />
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-body">
          <!-- <form> -->
          <div class="ins-wizard" data-wizard>
            <div class="row">
              <div class="col-md-4 col-xxl-3">
                <ul class="nav flex-column wizard-bordered wizard-tabs nav-pills" data-wizard-nav role="tablist">
                  @for (step of settingStepData; track $index; let i = $index) {
                  <li class="nav-item">
                    <a
                      class="nav-link"
                      [class]="
                                                i < currentStep ? 'wizard-item-done' :
                                                i === currentStep ? 'active' :
                                                ''
                                                "
                      (click)="goToStep(i)"
                    >
                      <span class="d-flex align-items-center">
                        <div class="avatar-md">
                          <span class="avatar-title bg-light rounded">
                            <app-icon [icon]="step.icon" class="fs-24"></app-icon>
                          </span>
                        </div>
                        <span class="flex-grow-1 ms-2 text-truncate">
                          <span class="fw-semibold text-body d-block fs-base">{{ step.title }}</span>
                          <span class="fs-xs mb-0">{{ step.subtitle }}</span>
                        </span>
                      </span>
                    </a>
                  </li>
                  }
                </ul>
              </div>
              <div class="col-md-8 col-xxl-9">
                <div class="tab-content border border-dashed rounded p-4">
                  <ng-container *ngComponentOutlet="settingStepData[currentStep].content"></ng-container>
                  <div class="d-flex justify-content-between mt-3">
                    @if(currentStep > 0){
                    <button type="button" class="btn btn-secondary" (click)="previousStep()">← Back</button>
                    }
                    <button class="btn ms-auto" [class]="currentStep === settingStepData.length - 1 ? 'btn-success' : 'btn-primary'" (click)="nextStep()">
                      {{ currentStep === settingStepData.length - 1 ? 'Save All Settings' : 'Next: ' + settingStepData[currentStep + 1].title + ' →' }}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <!-- </form> -->
        </div>
      </div>
    </div>
  </div>
</div>
