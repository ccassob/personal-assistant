<div class="container-fluid">
  <app-page-breadcrumb title="Contacts" subTitle="Users" />
  <div class="row mb-3">
    <div class="col-lg-12">
      <form class="bg-light-subtle rounded border p-3">
        <div class="row gap-3">
          <!-- Search Input -->
          <div class="col-lg-4">
            <div class="app-search">
              <input type="text" class="form-control" placeholder="Search contact name..." />
              <app-icon icon="search" class="app-search-icon text-muted"></app-icon>
            </div>
          </div>

          <div class="col">
            <div class="d-flex flex-wrap align-items-center gap-2">
              <span class="me-2 fw-semibold">Filter By:</span>

              <!-- Designation Filter -->
              <div class="app-search">
                <select class="form-select form-control my-1 my-md-0">
                  <option selected>Designation</option>
                  <option value="Manager">Manager</option>
                  <option value="Developer">Developer</option>
                  <option value="Designer">Designer</option>
                  <option value="Sales">Sales</option>
                  <option value="Support">Support</option>
                </select>
                <app-icon icon="user-check" class="app-search-icon text-muted"></app-icon>
              </div>

              <!-- Location Filter -->
              <div class="app-search">
                <select class="form-select form-control my-1 my-md-0">
                  <option selected>Location</option>
                  <option value="USA">USA</option>
                  <option value="UK">UK</option>
                  <option value="Germany">Germany</option>
                  <option value="India">India</option>
                  <option value="Canada">Canada</option>
                </select>
                <app-icon icon="map-pin" class="app-search-icon text-muted"></app-icon>
              </div>

              <!-- Department Filter -->
              <div class="app-search">
                <select class="form-select form-control my-1 my-md-0">
                  <option selected>Department</option>
                  <option value="UI/UX">UI/UX</option>
                  <option value="Engineering">Engineering</option>
                  <option value="HR">HR</option>
                  <option value="Marketing">Marketing</option>
                  <option value="Finance">Finance</option>
                </select>
                <app-icon icon="stack-2" class="app-search-icon text-muted"></app-icon>
              </div>

              <button type="submit" class="btn btn-secondary">Apply</button>

              <!-- Layout Toggle Buttons -->
              <div role="group" aria-label="Layout toggle button group" class="ms-auto flex-shrink-0">
                <input type="radio" class="btn-check" name="btnradio" id="btnradio1" checked />
                <label class="btn btn-soft-primary btn-icon me-1" for="btnradio1">
                  <app-icon icon="apps" class="fs-lg"></app-icon>
                </label>

                <input type="radio" class="btn-check" name="btnradio" id="btnradio2" />
                <label class="btn btn-soft-primary btn-icon" for="btnradio2">
                  <app-icon icon="list-check" class="fs-lg"></app-icon>
                </label>
              </div>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="row">
    @for (item of contactData; track $index) {
    <div class="col-md-6 col-xxl-3">
      <app-contact-card [item]="item" />
    </div>
    }
  </div>

  <ul class="pagination pagination-rounded pagination-boxed justify-content-center">
    <ngb-pagination [collectionSize]="50" [page]="2">
      <ng-template ngbPaginationPrevious>
        <app-icon icon="chevron-left"></app-icon>
      </ng-template>
      <ng-template ngbPaginationNext>
        <app-icon icon="chevron-right"></app-icon>
      </ng-template>
    </ngb-pagination>
  </ul>
</div>
