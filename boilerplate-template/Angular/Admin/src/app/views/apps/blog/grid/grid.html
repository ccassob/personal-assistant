<div class="container-fluid">
  <app-page-breadcrumb title="Blog" subTitle="Apps"></app-page-breadcrumb>

  <ngx-masonry class="row masonry-grid" [options]="{percentPosition:true} ">
    @for (blog of blogData; track $index) {
    <div class="col-xl-3 col-md-6" ngxMasonryItem>
      <app-blog-card [blog]="blog" />
    </div>
    }
  </ngx-masonry>
</div>
