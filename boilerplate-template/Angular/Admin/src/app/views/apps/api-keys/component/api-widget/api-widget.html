<div class="card">
  <div class="card-body">
    <div class="d-flex align-items-center gap-3">
      <div class="avatar-xl text-bg-light rounded-circle">
        <span class="avatar-title">
          <app-icon [icon]="item.icon" class="fs-xxl"></app-icon>
        </span>
      </div>
      <div class="flex-grow-1">
        <h6 class="mb-2 text-muted text-uppercase fs-xs">{{item.title}}</h6>
        <h4 class="mb-0 fw-bold">{{item.value}}</h4>
      </div>
    </div>
    @if (item.chartOptions) {
    <div class="mt-3">
      <app-apexchart [getOptions]="item.chartOptions" />
    </div>
    }
  </div>
</div>
