<div class="container-fluid">
  <app-page-breadcrumb title="Calendar" subTitle="Apps"></app-page-breadcrumb>

  <div class="outlook-box">
    <div class="card h-100 mb-0 d-none d-lg-flex rounded-end-0">
      <div class="card-body">
        <button class="btn btn-primary w-100 btn-new-event" (click)="openModal()">
          <app-icon icon="plus" class="me-2 align-middle"></app-icon>
          Create New Event
        </button>

        <div id="external-events">
          <p class="text-muted mt-2 fst-italic fs-xs mb-3">Drag and drop your event or click in the calendar</p>

          @for (event of externalEventData; track i; let i = $index) {
          <div class="external-event fc-event fw-semibold border-start border-3" [class]="event.className">
            <app-icon icon="circle-filled" class="me-2"></app-icon>
            {{ event.title }}
          </div>
          }
        </div>
      </div>
    </div>

    <div class="card h-100 mb-0 rounded-start-0 flex-grow-1 border-start-0">
      <div class="d-lg-none d-inline-flex card-header">
        <button class="btn btn-primary btn-new-event" (click)="openModal()">
          <app-icon icon="plus" class="me-2 align-middle"></app-icon>
          Create New Event
        </button>
      </div>

      <div class="card-body">
        <ngx-simplebar style="height: 100%">
          <full-calendar #calendar [options]="calendarOptions"></full-calendar>
        </ngx-simplebar>
      </div>
    </div>
  </div>
</div>

<ng-template #eventModal>
  <div class="modal-content">
    <div class="modal-header">
      <h4 class="modal-title">Create Event</h4>
      <button type="button" class="btn-close" (click)="modalRef.close()"></button>
    </div>
    <div class="modal-body">
      <div class="mb-2">
        <label class="form-label">Event Name</label>
        <input class="form-control" placeholder="Insert Event Name" [(ngModel)]="currentEventTitle" />
        <div class="invalid-feedback">Please provide a valid event name</div>
      </div>
      <div class="col-12">
        <div class="mb-2">
          <label class="control-label form-label" for="event-category">Category</label>
          <select [(ngModel)]="currentEventVariant" class="form-select" name="category" id="event-category">
            <option value="" disabled>Select a category</option>
            <option value="bg-primary-subtle text-primary border-start border-3 border-primary">Primary</option>
            <option value="bg-secondary-subtle text-secondary border-start border-3 border-secondary">Secondary</option>
            <option value="bg-success-subtle text-success border-start border-3 border-success">Success</option>
            <option value="bg-info-subtle text-info border-start border-3 border-info">Info</option>
            <option value="bg-warning-subtle text-warning border-start border-3 border-warning">Warning</option>
            <option value="bg-danger-subtle text-danger border-start border-3 border-danger">Danger</option>
            <option value="bg-dark-subtle text-dark border-start border-3 border-dark">Dark</option>
          </select>
          <div class="invalid-feedback">Please select a valid event category</div>
        </div>
      </div>
      <div class="d-flex flex-wrap align-items-center gap-2">
        @if (currentEditingEvent) {
        <button type="button" class="btn btn-danger" (click)="deleteEvent()">Delete</button>
        }

        <button type="button" class="btn btn-light ms-auto" (click)="modalRef.close()">Close</button>

        <button type="submit" class="btn btn-primary" (click)="saveEvent()">Save</button>
      </div>
    </div>
  </div>
</ng-template>
