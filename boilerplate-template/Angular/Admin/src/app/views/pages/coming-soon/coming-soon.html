<div class="p-0 w-100">
  <div class="row w-100 g-0">
    <div class="col-xl-6">
      <div class="card border-0 mb-0">
        <div class="card-body min-vh-100 d-flex flex-column justify-content-center">
          <div class="auth-brand mb-0 text-center">
            <a routerLink="/" class="logo-dark">
              <img src="assets/images/logo-black.png" alt="dark logo" />
            </a>
            <a routerLink="/" class="logo-light">
              <img src="assets/images/logo.png" alt="logo" />
            </a>
          </div>

          <div class="mt-auto">
            <div class="p-4 text-center">
              <h3 class="fw-bold my-2">Big things are on the Way</h3>
              <p class="text-muted mb-0">We're crafting something awesome. Stay tuned!</p>

              <div class="row text-center justify-content-center my-4 g-4">
                <div class="col-6 col-sm-4 col-md-3 col-lg">
                  <div class="bg-light bg-opacity-10 px-2 py-4 rounded shadow-inner">
                    <h2 id="days" class="fw-bold text-primary fs-36">{{ countdown.days }}</h2>
                    <p class="fw-semibold fs-xs mb-0">Days</p>
                  </div>
                </div>
                <div class="col-6 col-sm-4 col-md-3 col-lg">
                  <div class="bg-light bg-opacity-10 px-2 py-4 rounded shadow-inner">
                    <h3 id="hours" class="fw-bold text-primary fs-36">{{ countdown.hours }}</h3>
                    <p class="fw-semibold fs-xs mb-0">Hours</p>
                  </div>
                </div>
                <div class="col-6 col-sm-4 col-md-3 col-lg">
                  <div class="bg-light bg-opacity-10 px-2 py-4 rounded shadow-inner">
                    <h3 id="minutes" class="fw-bold text-primary fs-36">{{ countdown.minutes }}</h3>
                    <p class="fw-semibold fs-xs mb-0">Minutes</p>
                  </div>
                </div>
                <div class="col-6 col-sm-4 col-md-3 col-lg">
                  <div class="bg-light bg-opacity-10 px-2 py-4 rounded shadow-inner">
                    <h3 id="seconds" class="fw-bold text-primary fs-36">{{ countdown.seconds }}</h3>
                    <p class="fw-semibold fs-xs mb-0">Seconds</p>
                  </div>
                </div>
              </div>

              <div class="error-glitch fs-xl">Stay tunned!</div>

              <div class="app-search app-search-pill w-xl-75 mx-auto input-group mt-3 rounded-pill">
                <input type="text" class="form-control py-2" placeholder="Enter email..." />
                <app-icon icon="mail" class="app-search-icon text-muted"></app-icon>
                <button class="btn btn-secondary" type="button">Notify me!</button>
              </div>
            </div>
          </div>

          <p class="text-center text-muted mt-auto mb-0">
            © {{currentYear}} {{name}} — by
            <span class="fw-semibold">{{author}}</span>
          </p>
        </div>
      </div>
      <!-- End Auth Box Content -->
    </div>
    <div class="col">
      <div class="h-100 position-relative card-side-img rounded-0 overflow-hidden" style="background-image: url('assets/images/auth.jpg')">
        <div class="p-4 card-img-overlay auth-overlay d-flex align-items-end justify-content-center"></div>
      </div>
    </div>
  </div>
</div>
