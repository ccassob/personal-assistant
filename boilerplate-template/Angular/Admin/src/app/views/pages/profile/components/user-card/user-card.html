<article class="card card-out-of-container border-top-0">
  <div class="position-relative card-side-img overflow-hidden" style="height: 250px; background-image: url(assets/images/profile-bg.jpg)">
    <div class="p-4 card-img-overlay rounded-start-0 auth-overlay d-flex align-items-center justify-content-center">
      <h3 class="text-white mb-0 fst-italic">"Designing the future, one template at a time"</h3>
    </div>
  </div>

  <!-- Card Body -->
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center">
      <div class="d-flex justify-content-start align-items-center gap-3">
        <div class="avatar avatar-xxl">
          <img src="assets/images/users/user-1.jpg" alt="avatar-2" class="img-fluid img-thumbnail rounded-circle" />
        </div>
        <div>
          <h4 class="text-nowrap fw-bold mb-1">{{username}}</h4>
          <p class="text-muted mb-1">Product Designer</p>
          <span class="badge badge-soft-primary fw-medium ms-2 fs-xs ms-auto">Author</span>
        </div>
      </div>
      <div ngbDropdown class="d-flex gap-2" placement="bottom-end">
        <a class="btn btn-outline-primary" [routerLink]="[]">Follow</a>
        <a class="btn btn-primary" [routerLink]="[]">Message</a>
        <button class="btn btn-icon btn-dark drop-arrow-none" ngbDropdownToggle>
          <app-icon icon="dots" class="fs-24"></app-icon>
        </button>
        <ul ngbDropdownMenu>
          <li>
            <a ngbDropdownItem [routerLink]="[]">Edit Profile</a>
          </li>
          <li>
            <a ngbDropdownItem class="text-danger" [routerLink]="[]">Report</a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</article>
