<div class="card">
  <div class="card-header">
    <h4 class="card-title">My Social Feed</h4>
  </div>
  <div class="card-body">
    @for (item of socialFeedData; track $index; let last = $last;let first = $first) {

    <div
      class="d-flex justify-content-between align-items-center {{ !last ? 'border-bottom' : 'pt-2' }}
{{ first ? 'pb-2' : (!last ? 'py-2' : '') }}"
    >
      <div class="d-flex align-items-center gap-2">
        <div class="avatar avatar-sm">
          <img [src]="item.image" class="img-fluid rounded" />
        </div>

        <div>
          <h5 class="fs-sm mb-0 lh-base">{{ item.name }}</h5>
          <p class="text-muted fs-xs mb-0">{{ item.text }}</p>
        </div>

        @if (item.badge) {
        <div>
          <span class="badge badge-soft-{{item.badge.variant}}"> {{item.badge.text}} </span>
        </div>
        }
      </div>

      <div>
        @if (item.time) {
        <small class="text-muted fs-xxs">{{ item.time }}</small>
        }
        <div class="d-flex gap-1">
          @if (item.actionIcons) { @for (icon of item.actionIcons; track $index) {
          <a [routerLink]="[]" class="btn btn-sm btn-icon btn-{{icon.variant}}">
            <app-icon [icon]="icon.icon" class="fs-lg"></app-icon>
          </a>
          } }
        </div>
      </div>
    </div>

    }
  </div>
</div>
