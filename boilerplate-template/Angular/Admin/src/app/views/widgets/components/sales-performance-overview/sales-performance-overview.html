<div class="card">
  <div class="card-body p-0">
    <div class="p-3 bg-light-subtle border-bottom border-dashed">
      <div class="row">
        <div class="col">
          <h4 class="fs-sm mb-1">Would you like the full report?</h4>
          <small class="text-muted fs-xs mb-0"> All 120 orders have been successfully delivered </small>
        </div>
        <div class="col-auto align-self-center">
          <button type="button" class="btn btn-sm btn-default rounded-circle btn-icon" placement="top" ngbTooltip="Download">
            <iconify-icon icon="tabler:download" class="fs-xl"></iconify-icon>
          </button>
        </div>
      </div>
    </div>
    <div class="row row-cols-xxl-2 row-cols-md-2 row-cols-1 g-1 p-1">
      @for(item of salesOverviewData;track $index){
      <div class="col">
        <div class="card rounded-0 border shadow-none border-dashed mb-0" [class]="item.variant ? 'bg-opacity-10 bg-' + item.variant + ' border-' + item.variant : ''">
          <div class="card-body">
            <div class="mb-3 d-flex justify-content-between align-items-center">
              <h5 class="fs-xl mb-0">
                {{item.prefix}}{{item.value}} @if (item.suffix) {
                <small class="fs-6">{{ item.suffix }}</small>
                }
              </h5>
              <span
                >{{ item.change }}% @if(item.change> 0){<iconify-icon icon="tabler:arrow-up" class="text-success"></iconify-icon> } @else{ <iconify-icon icon="tabler:arrow-down" class="text-danger"></iconify-icon>
                }
              </span>
            </div>
            <p class="text-muted mb-2"><span>{{item.title}}</span></p>
            <ngb-progressbar [value]="item.progress" class="progress-sm mb-0" [textType]="item.variant ? item.variant : 'primary'" [type]="item.variant ? item.variant : 'primary'" />
          </div>
        </div>
      </div>
      }
    </div>

    <div class="text-center my-2">
      <a [routerLink]="[]" class="link-reset text-decoration-underline fw-semibold link-offset-3"> View all Links <iconify-icon icon="tabler:link"></iconify-icon> </a>
    </div>
  </div>
</div>
