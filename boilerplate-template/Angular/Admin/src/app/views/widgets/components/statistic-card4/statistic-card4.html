<div class="card">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <h3 class="mb-1">{{item.prefix}}<span [countUp]="item.value" [countUpOptions]="{decimalPlaces: Number.isInteger(item.value) ? 0 : 2}"></span>{{item.suffix}}</h3>
        <p class="mb-0 text-muted">{{item.title}}</p>
      </div>
      <div class="avatar fs-60 avatar-img-size flex-shrink-0">
        <span class="avatar-title bg-{{item.variant}}-subtle text-{{item.variant}} rounded-circle fs-32">
          <iconify-icon [icon]="item.icon"></iconify-icon>
        </span>
      </div>
    </div>
  </div>
</div>
