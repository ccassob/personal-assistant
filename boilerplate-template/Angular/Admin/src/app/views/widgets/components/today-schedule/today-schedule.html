<div class="card">
  <div class="card-header justify-content-between">
    <h4 class="card-title">Today's Schedule</h4>
    <a href="javascript: void(0);" class="link-primary fw-semibold"><iconify-icon icon="tabler:calendar" class="me-1"></iconify-icon><span>Invite</span></a>
  </div>
  <div class="card-body">
    @for (item of meetingData; track $index; let last = $last;) {
    <div class="{{last ? 'py-2' : 'pb-2'}}  border-bottom border-light border-dashed">
      <div class="mb-2">
        <p class="mb-1 text-truncate fs-sm fw-medium">{{ item.title }}</p>
        <span class="text-{{item.variant}} fs-xs">{{item.subtitle}}</span>
      </div>
      <div class="d-flex justify-content-between align-items-center">
        <div class="avatar-group avatar-group-xs">
          @for (user of item.users; track $index) { @if(user.image){
          <div class="avatar">
            <img [src]="user.image" [alt]="user.name" class="avatar-xs rounded-circle" />
          </div>
          } @else{
          <div class="avatar avatar-xs">
            <span class="avatar-title bg-primary-subtle text-primary rounded-circle fw-bold"> {{ generateInitials(user.name) }} </span>
          </div>
          } }
        </div>
        <button type="button" class="btn btn-sm btn-soft-secondary rounded-circle btn-icon">
          <iconify-icon [icon]="item.icon" class="fs-lg"></iconify-icon>
        </button>
      </div>
    </div>
    }
  </div>
</div>
