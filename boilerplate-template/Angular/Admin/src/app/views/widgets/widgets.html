<div class="container-fluid">
  <app-page-breadcrumb title="Widgets" subTitle="Pages" />
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-body">
          <div class="row row-cols-xxl-4 row-cols-md-2 row-cols-1 g-3 align-items-center">
            @for (item of statisticCard1Data; track $index) {
            <div class="col">
              <app-statistic-card1 [item]="item" />
            </div>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-xl-4">
      <app-sales-performance-overview />
    </div>

    <div class="col-xxl-4 col-lg-6">
      <app-traffic-sources />
    </div>

    <div class="col-xxl-4 col-lg-6">
      <app-top-countries />
    </div>
  </div>
  <div class="row">
    <div class="col-xl-4">
      <app-profile-card />

      <app-comment-card />
    </div>

    <div class="col-xl-4">
      <app-chat-card />

      <contact-card />
    </div>

    <div class="col-xl-4">
      <app-file-manage-card />

      <app-today-schedule />
    </div>
  </div>

  <app-statistic-card2 />

  <div class="row row-cols-xxl-4 row-cols-md-2 row-cols-1">
    @for (item of statisticCard3Data; track $index) {
    <div class="col">
      <app-statistic-card3 [item]="item" />
    </div>
    }
  </div>

  <div class="row row-cols-xxl-4 row-cols-md-2 row-cols-1">
    @for (item of statisticCard4Data; track $index) {
    <div class="col">
      <app-statistic-card4 [item]="item" />
    </div>
    }
  </div>
  <!-- end row -->

  <div class="row row-cols-xxl-4 row-cols-md-2 row-cols-1">
    @for (item of statisticCard5Data; track $index) {
    <div class="col">
      <app-statistic-card5 [item]="item" />
    </div>
    }
  </div>

  <div class="row row-cols-xxl-6 row-cols-md-3 row-cols-2">
    @for (item of statisticCard6Data; track $index) {
    <div class="col">
      <app-statistic-card6 [item]="item" />
    </div>
    }
  </div>
</div>
