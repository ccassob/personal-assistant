<app-card-with-action title="Traffic Sources" [isCloseable]="true" [isTogglable]="true" [isReloadable]="true">
  <div card-body>
    <div class="row mb-2">
      <div class="col-lg">
        <h3 class="mb-2 fw-bold">{{ currentVisitors$ | async }}</h3>
        <p class="mb-2 fw-semibold text-muted">Right Now</p>
      </div>
      <!--end col-->
      <div class="col-lg-auto align-self-center">
        <ul class="list-unstyled mb-0 lh-lg">
          <li>
            <iconify-icon icon="tabler:caret-right-filled" class="fs-lg align-middle text-primary"></iconify-icon>
            <span class="text-muted">Organic</span>
          </li>
          <li>
            <iconify-icon icon="tabler:caret-right-filled" class="fs-lg align-middle text-success"></iconify-icon>
            <span class="text-muted">Direct</span>
          </li>
          <li>
            <iconify-icon icon="tabler:caret-right-filled" class="fs-lg align-middle"></iconify-icon>
            <span class="text-muted">Campaign</span>
          </li>
        </ul>
      </div>
      <!--end col-->
    </div>
    <!--end row-->
    <ngb-progressbar-stacked style="height: 20px" class="mb-3">
      <ngb-progressbar [value]="25" type="primary" style="height: 20px" />
      <ngb-progressbar [value]="50" type="success" style="height: 20px" />
      <ngb-progressbar [value]="15" type="info" style="height: 20px" />
    </ngb-progressbar-stacked>
    <div class="table-responsive">
      <table class="table table-sm table-custom table-nowrap table-hover table-centered mb-0">
        <thead class="bg-light align-middle bg-opacity-25 thead-sm">
          <tr class="text-uppercase fs-xxs">
            <th class="text-muted">URL</th>
            <th class="text-muted text-end">Views</th>
            <th class="text-muted text-end">Uniques</th>
          </tr>
        </thead>
        <tbody>
          @for (item of trafficData; track $index) {
          <tr>
            <td class="text-decoration-underline">{{ item.pageLink }}</td>
            <td class="text-end">{{ item.views }}k</td>
            <td class="text-end">{{ item.unique }}k</td>
          </tr>
          }
        </tbody>
      </table>
    </div>
    <div class="text-end mt-3">
      <a routerLink="/apps/chat" class="link-reset text-decoration-underline fw-semibold link-offset-3"> View all Links <iconify-icon icon="tabler:link"></iconify-icon> </a>
    </div>
  </div>
</app-card-with-action>
