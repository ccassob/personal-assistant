<app-card-with-action bodyClass="p-0" title="Sessions Device" [isCloseable]="true" [isTogglable]="true" [isReloadable]="true">
  <div card-body>
    <div class="card-body pb-0">
      <app-apexchart [getOptions]="deviceSessionsChartOptions" class="apex-chart"></app-apexchart>
    </div>

    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-custom table-nowrap table-hover table-centered mb-0">
          <thead class="bg-light align-middle bg-opacity-25 thead-sm">
            <tr class="text-uppercase fs-xxs">
              <th class="text-muted">Device</th>
              <th class="text-muted">Sessions</th>
              <th class="text-muted">Change</th>
              <th class="text-muted text-end">Traffic %</th>
            </tr>
          </thead>
          <tbody>
            @for (item of deviceSessionData; track $index; let last = $last) {
            <tr>
              <td [class]="$last ? 'border-bottom-0' : ''">
                <h5 class="fs-base lh-base mb-0">{{ item.name }}</h5>
                <p class="fs-xxs mb-0 text-body-secondary">- {{ item.platforms }}</p>
              </td>
              <td [class]="$last ? 'border-bottom-0' : ''">{{ item.users }}</td>
              <td
                [class]="{
                    'text-success': item.isPositive,
                    'text-danger': !item.isPositive,
                    'border-bottom-0': $last,
                  }"
              >
                {{ item.isPositive ? '+' : '-' }}{{ item.change }}%
              </td>
              <td class="text-end" [class]="$last ? 'border-bottom-0' : ''">{{ item.percentage }}%</td>
            </tr>
            }
          </tbody>
        </table>
      </div>
      <!-- end table-responsive-->
    </div>
    <!-- end card-body-->
  </div>
</app-card-with-action>
