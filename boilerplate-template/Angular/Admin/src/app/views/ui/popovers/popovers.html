<div class="container-fluid">
  <app-page-breadcrumb title="Popovers" subTitle="UI" />

  <div class="container-xxl">
    <div class="row">
      <div class="col-12">
        <div class="card">
          <div class="card-header">
            <h4 class="card-title">Examples</h4>
          </div>

          <div class="card-body">
            <p class="text-muted mb-2">Documentation and examples for adding Bootstrap popovers, like those found in iOS, to any element on your site.</p>

            <a class="btn btn-link p-0 fw-semibold" href="https://getbootstrap.com/docs/5.3/components/popovers/" target="_blank">
              Popovers on Bootstrap
              <app-icon icon="chevron-right" class="ms-1"></app-icon>
            </a>
          </div>
        </div>
      </div>

      <div class="col-xl-6">
        <div class="card">
          <div class="card-header">
            <h4 class="card-title">Simple Popover</h4>
          </div>

          <div class="card-body">
            <button type="button" class="btn btn-info" popoverTitle="Need Help?" placement="right" ngbPopover="Click here to get support from our team. We're here 24/7 to assist you.">Get Support Info</button>
          </div>
        </div>
      </div>

      <div class="col-xl-6">
        <div class="card">
          <div class="card-header">
            <h4 class="card-title">Dismiss on Next Click</h4>
          </div>

          <div class="card-body">
            <button type="button" tabindex="0" autoClose="inside" triggers="focus" class="btn btn-primary" placement="right" ngbPopover="Get quick tips and tricks to improve your workflow instantly." popoverTitle="Quick Tips">Show Tips</button>
          </div>
          <!-- end card-body -->
        </div>
        <!-- end card-->
      </div>

      <div class="col-xl-6">
        <div class="card">
          <div class="card-header">
            <h4 class="card-title">Hover</h4>
          </div>

          <div class="card-body">
            <button type="button" tabindex="0" class="btn btn-dark" placement="right" triggers="hover" ngbPopover="Discover features you didn’t know existed. Hover to explore more!" popoverTitle="Exciting Features!">Please Hover Me</button>
          </div>
          <!-- end card-body -->
        </div>
        <!-- end card-->
      </div>
      <!-- end col -->

      <div class="col-xl-6">
        <div class="card">
          <div class="card-header">
            <h4 class="card-title">Four Directions</h4>
          </div>

          <div class="card-body">
            <div class="d-flex flex-wrap gap-2">
              <button type="button" class="btn btn-primary" placement="top" popoverTitle="Top Popover" ngbPopover="This popover appears above the button. Great for tips or info.">Popover on top</button>

              <button type="button" class="btn btn-primary" placement="bottom" popoverTitle="Bottom Popover" ngbPopover="This popover shows below. Perfect for additional details.">Popover on bottom</button>

              <button type="button" class="btn btn-primary" placement="right" popoverTitle="Right Popover" ngbPopover="Slide in from the right to provide quick insights.">Popover on right</button>

              <button type="button" class="btn btn-primary" placement="left" popoverTitle="Left Popover" ngbPopover="Appears on the left side. Great for tooltips or notes.">Popover on left</button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-xl-6">
        <div class="card">
          <div class="card-header">
            <h4 class="card-title">Custom Popovers</h4>
          </div>

          <div class="card-body">
            <div class="d-flex flex-wrap gap-2">
              @for (variant of popoverVariants; track $index) {
              <button type="button" class="btn btn-{{variant}}" placement="right" autoClose="inside" popoverClass="popover-{{variant}}" popoverTitle="{{toTitleCase(variant)}} Popover" ngbPopover="This is a {{variant}}-themed popover styled using CSS variables.">
                {{ toTitleCase(variant) }} Popover
              </button>
              }
            </div>
          </div>
        </div>
      </div>

      <div class="col-xl-6">
        <div class="card">
          <div class="card-header">
            <h4 class="card-title">Disabled Elements</h4>
          </div>

          <div class="card-body">
            <span class="d-inline-block" placement="top" ngbPopover="This button is disabled, but the popover still works.">
              <button class="btn btn-primary" type="button" disabled style="pointer-events: none">Disabled Button</button>
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
