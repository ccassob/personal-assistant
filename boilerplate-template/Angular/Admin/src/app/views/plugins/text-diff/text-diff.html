<div class="container-fluid">
  <app-page-breadcrumb title="Text Diff" subTitle="Plugins" />

  <div class="card">
    <div class="card-header">
      <h4 class="card-title">jsdiff</h4>
    </div>

    <div class="card-body">
      <div class="row">
        <div class="col-md-6">
          <h5 class="mb-2 text-uppercase">Original Text</h5>
          <textarea class="diff-original form-control" rows="8" [(ngModel)]="originalText" (ngModelChange)="computeDiff()"> </textarea>
        </div>
        <!-- end col -->

        <div class="col-md-6">
          <h5 class="mb-2 text-uppercase">Changed Text</h5>
          <textarea class="diff-changed form-control" rows="8" [(ngModel)]="changedText" (ngModelChange)="computeDiff()"> </textarea>
        </div>
        <!-- end col -->

        <div class="col-md-12">
          <h5 class="mb-2 mt-3 text-uppercase">Results</h5>
          <div class="p-3 bg-light-subtle border border-dashed rounded lh-lg">
            <div class="diff-output diff" [innerHTML]="diffResult"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
