<div class="container-fluid">
  <app-page-breadcrumb title="PDF Viewer" subTitle="Plugins" />
  <div class="container">
    <div class="row">
      <div class="col-12">
        <div class="card">
          <div class="card-body">
            <div class="text-center">
              <div class="btn-group text-nowrap">
                <button (click)="goToPrevPage()" id="prev" class="btn btn-dark">
                  <app-icon icon="arrow-left"></app-icon>
                  <span class="d-none d-sm-inline ms-2">Previous</span>
                </button>

                <button (click)="goToNextPage()" id="next" class="btn btn-dark">
                  <app-icon icon="arrow-right"></app-icon>
                  <span class="d-none d-sm-inline ms-2">Next</span>
                </button>

                <button (click)="zoomIn()" id="zoomin" class="btn btn-dark">
                  <app-icon icon="zoom-in"></app-icon>
                  <span class="d-none d-sm-inline ms-2">Zoom In</span>
                </button>

                <button (click)="zoomOut()" id="zoomout" class="btn btn-dark">
                  <app-icon icon="zoom-out"></app-icon>
                  <span class="d-none d-sm-inline ms-2">Zoom Out</span>
                </button>

                <button (click)="zoomFit()" id="zoomfit" class="btn btn-dark rounded-end-3">100%</button>

                <input type="text" class="form-control rounded-end-0 ms-1" [(ngModel)]="currentPage" [min]="1" [max]="totalPages" style="width: 50px" />
                <span class="input-group-text rounded-start-0 border-start-0" id="page_count">/ {{ totalPages }}</span>
              </div>
            </div>

            <div class="text-center overflow-auto mt-3">
              <pdf-viewer
                [src]="pdfSrc"
                [show-borders]="true"
                [zoom-scale]="'page-height'"
                [page]="currentPage"
                [zoom]="zoom"
                (after-load-complete)="afterLoadComplete($event)"
                [show-all]="false"
                [original-size]="false"
                [render-text]="true"
                style="height: 1188px"
                class="pdfcanvas"
              ></pdf-viewer>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
