<div class="container-fluid">
  <app-page-breadcrumb title="Masonry" subTitle="Plugins" />

  <ngx-masonry class="row masonry-grid" [options]="{ percentPosition: true }">
    @for (card of blogData; track $index) {
    <div class="col-xl-3 col-md-6 mb-3" ngxMasonryItem>
      @if (card.type === 'quote') {
      <article class="card mb-0">
        <!-- Card Body -->
        <div class="card-body">
          <blockquote class="blockquote">
            <p>{{ card.title }}</p>
          </blockquote>
          <figcaption class="blockquote-footer mb-0 text-muted">
            Someone famous in
            <cite title="Source Title">Source Title</cite>
          </figcaption>
        </div>

        <!-- Card footer -->
        <div class="card-footer bg-transparent d-flex justify-content-between">
          <div class="d-flex justify-content-start align-items-center gap-2">
            <div class="avatar avatar-xs">
              <img [src]="card.user.image" alt="avatar-7" class="img-fluid rounded-circle" />
            </div>
            <div>
              <h5 class="text-nowrap fs-sm mb-0 lh-base">
                <a [routerLink]="[]" class="link-reset">{{ card.user.name }}</a>
              </h5>
            </div>
          </div>
          <a class="link-primary fw-semibold" [routerLink]="[]">
            Read more
            <app-icon icon="arrow-right"></app-icon>
          </a>
        </div>
      </article>
      } @else {
      <article class="card mb-0">
        <div class="card-body">
          <h6 class="card-title fs-lg lh-base mb-2">
            <a [routerLink]="[]" class="link-reset">{{ card.title }}</a>
          </h6>

          <p class="mb-3 text-muted">{{ card.description }}</p>

          <div>
            @for (tag of card.tags; track $index) {
            <a [routerLink]="[]" class="badge badge-label badge-default me-1">{{ tag }}</a>
            }
          </div>
        </div>

        <div class="card-footer bg-transparent d-flex justify-content-between">
          <div class="d-flex justify-content-start align-items-center gap-2">
            <div class="avatar avatar-xs">
              <img [src]="card.user.image" alt="avatar" class="img-fluid rounded-circle" />
            </div>
            <div>
              <h5 class="text-nowrap fs-sm mb-0 lh-base">
                <a [routerLink]="[]" class="link-reset">{{ card.user.name }}</a>
              </h5>
            </div>
          </div>

          <a class="link-primary fw-semibold" [routerLink]="[]">
            Read more
            <app-icon icon="arrow-right"></app-icon>
          </a>
        </div>
      </article>
      }
    </div>
    }
  </ngx-masonry>
</div>
