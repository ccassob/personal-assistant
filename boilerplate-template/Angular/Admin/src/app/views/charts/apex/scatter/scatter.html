<div class="container-fluid">
  <app-page-breadcrumb title="Scatter Apexchart" subTitle="Charts" />
  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Scatter (XY) Chart</h4>
        </div>
        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="basicScatter"></app-apexchart>
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Scatter Chart - Datetime</h4>
        </div>
        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="datetimeScatter"></app-apexchart>
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->

  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Scatter - Images</h4>
        </div>
        <div class="card-body">
          <div dir="ltr">
            <app-apexchart class="scatter-images-chart" [getOptions]="scatterImages"></app-apexchart>
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->
</div>
