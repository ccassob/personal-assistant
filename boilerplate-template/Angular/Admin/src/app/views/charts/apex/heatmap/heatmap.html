<div class="container-fluid">
  <app-page-breadcrumb title="Heatmap Apexchart" subTitle="Charts" />
  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Heatmap - Single Series</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="singleSeriesHeatmapChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Multiple Series</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="multipleSeriesHeatmapChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Heatmap - Color Range</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="colorRangeHeatmapChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Heatmap - Range without Shades</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="rangeWithoutShadesHeatmapChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->
</div>
