<div class="container-fluid">
  <app-page-breadcrumb title="Bubble Apexchart" subTitle="Charts" />
  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Simple Bubble Charts</h4>
        </div>
        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="simpleBubbleChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">3D Bubble Charts</h4>
        </div>
        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="threedBubbleChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Bubble Charts</h4>
        </div>
        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="bubbleChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->
</div>
