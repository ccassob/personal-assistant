<div class="container-fluid">
  <app-page-breadcrumb title="Mixed Apexchart" subTitle="Charts" />
  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Line & Column Chart</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="lineColumnChart" />
          </div>
        </div>
      </div>
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Multiple Y-Axis Chart</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="multiYAxisChart" />
          </div>
        </div>
      </div>
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->

  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Line & Area Chart</h4>
        </div>
        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="lineAreaChart" />
          </div>
        </div>
      </div>
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Line, Column & Area Chart</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="allMixedChart" />
          </div>
        </div>
      </div>
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->
</div>
