<div class="container-fluid">
  <app-page-breadcrumb title="Pie Apexchart" subTitle="Charts" />
  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Simple Pie Chart</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="simplePieChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Simple Donut Chart</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="simpleDonutChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->

  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Monochrome Pie Chart</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="monochromePieChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Gradient Donut Chart</h4>
        </div>
        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="gradientDonutChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->

  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Patterned Donut Chart</h4>
        </div>
        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="patternedDonutChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Pie Chart with Image fill</h4>
        </div>
        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="imagePieChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->

  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Donut Update</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="getDonutOptions" />
          </div>

          <div class="text-center mt-2">
            <button class="btn btn-sm btn-primary me-1" (click)="randomizeChart()">RANDOMIZE</button>
            <button class="btn btn-sm btn-primary me-1" (click)="addData()">ADD</button>
            <button class="btn btn-sm btn-primary me-1" (click)="removeData()">REMOVE</button>
            <button class="btn btn-sm btn-primary me-1" (click)="resetChart()">RESET</button>
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->
</div>
