<div class="container-fluid">
  <app-page-breadcrumb title="RadialBar Apexchart" subTitle="Charts" />
  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Basic RadialBar Chart</h4>
        </div>
        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="basicRadialBar"></app-apexchart>
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Multiple RadialBars</h4>
        </div>
        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="multipleRadialBars"></app-apexchart>
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->

  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Circle Chart - Custom Angle</h4>
        </div>
        <div class="card-body">
          <div class="text-center" dir="ltr">
            <app-apexchart [getOptions]="customAngleCircle"></app-apexchart>
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Circle Chart with Image</h4>
        </div>
        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="imageFillCircle"></app-apexchart>
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->

  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Stroked Circular Guage</h4>
        </div>
        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="strokedGauge"></app-apexchart>
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Gradient Circular Chart</h4>
        </div>
        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="gradientCircle"></app-apexchart>
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->

  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Semi Circle Gauge</h4>
        </div>
        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="semiCircleGauge"></app-apexchart>
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->
</div>
