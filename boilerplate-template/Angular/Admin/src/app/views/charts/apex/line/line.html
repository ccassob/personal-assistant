<div class="container-fluid">
  <app-page-breadcrumb title="Line Apexchart" subTitle="Charts" />
  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Simple line chart</h4>
        </div>
        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="lineChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Line with Data Labels</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="lineWithDataLabelChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->

  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Zoomable Timeseries</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="zoomableLineChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Line Chart with Annotations</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="lineWithAnnotationsChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->

  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Syncing charts</h4>
        </div>

        <div class="card-body">
          <app-apexchart [getOptions]="syncChartSecondary" />
          <div dir="ltr">
            <app-apexchart [getOptions]="syncChartPrimary" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Gradient Line Chart</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="gradientLineChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->

  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Missing / Null values</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="missingDataLineChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Dashed Line Chart</h4>
        </div>
        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="dashedLineChart" />
          </div>
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->

  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Stepline Chart</h4>
        </div>

        <div class="card-body">
          <app-apexchart [getOptions]="stepLineChart" />
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Brush Chart</h4>
        </div>

        <div class="card-body">
          <app-apexchart [getOptions]="brushChartMain" />
          <app-apexchart [getOptions]="brushChartOverview" />
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->

  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Realtime Chart</h4>
        </div>

        <div class="card-body">
          <app-apexchart #chart [getOptions]="RealtimeLineChart" />
        </div>
        <!-- end card body-->
      </div>
      <!-- end card -->
    </div>
    <!-- end col-->
  </div>
  <!-- end row-->
</div>
