<div class="container-fluid">
  <app-page-breadcrumb title="Area Apexchart" subTitle="Charts" />
  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Basic Area Chart</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="basicAreaChart" />
          </div>
        </div>
      </div>
    </div>

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Spline Area</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="splineAreaChart" />
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- end row-->

  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Area Chart - Datetime X-axis</h4>
        </div>

        <div class="card-body">
          <div class="toolbar apex-toolbar">
            @for (range of ['1M', '6M', '1Y', 'YTD', 'ALL']; track $index) {
            <button class="btn btn-sm btn-light me-1" [class.active]="selectedRange === range" (click)="updateChart(range)">{{ range }}</button>
            }
          </div>
          <div dir="ltr">
            <app-apexchart [getOptions]="getDatetimeChartOptions" />
          </div>
        </div>
      </div>
    </div>

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Area with Negative Values</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="negativeAreaChart" />
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- end row-->

  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Irregular TimeSeries</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="timeSeriesAreaChart" />
          </div>
        </div>
      </div>
    </div>

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Area Chart with Null values</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="nullValueAreaChart" />
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- end row-->

  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Stacked Area</h4>
        </div>

        <div class="card-body">
          <div dir="ltr">
            <app-apexchart [getOptions]="stackedAreaChart" />
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- end row-->
</div>
