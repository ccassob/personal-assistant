<div class="container-fluid">
  <app-page-breadcrumb title="Line Echart" subTitle="Charts" />
  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Line Chart</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="lineCharts" height="300px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Line Stacked Chart</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="lineStacked" height="300px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Line Marker</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="lineMarker" height="300px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Dynamic Line</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="getLineChartOptions" (chartInit)="onChartReady($event)" height="300px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Step Line</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="stepLine" height="300px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Line Y Category</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="lineCategory" height="300px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->
  </div>
  <!-- end row -->
</div>
