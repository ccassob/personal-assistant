<div class="container-fluid">
  <app-page-breadcrumb title="Bar Echart" subTitle="Charts" />
  <div class="row">
    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Basic Bar Chart</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="barChart" height="300px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Two Bar Chart</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="twoBar" height="300px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Progress Bar Chart</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="progressBar" height="300px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Horizontal Bar Chart</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="horizontalBar" height="300px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Negative Chart</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="negative" height="300px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Bar Chart with Series</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="withSeries" height="300px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Stacked Bar</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="stacked" height="300px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Horizontal Stacked Bar</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="horizontalStacked" height="300px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Bar Race Chart</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="BarRaceChart" (chartInit)="onChartReady($event)" height="300px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Bar Gradient Chart</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="barGradiant" height="300px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->

    <div class="col-xl-6">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Mixded Bar Chart</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="mixedBar" height="300px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->

    <div class="col-xl-12">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Timeline Bar Chart</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="timelineBar" height="500px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->
  </div>
  <!-- end row -->
</div>
