<div class="container-fluid">
  <app-page-breadcrumb title="Candlestick Echart" subTitle="Charts" />
  <div class="row">
    <div class="col-xl-12">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Basic Candlestick Chart</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="basicCandle" height="400px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->
    <div class="col-xl-12">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title mb-0">Mixed Candlestick Chart</h4>
        </div>
        <div class="card-body">
          <app-echart [getOptions]="mixedCandle" height="400px" />
        </div>
      </div>
      <!-- end card -->
    </div>
    <!-- end col -->
  </div>
  <!-- end row -->
</div>
