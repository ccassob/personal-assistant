<div class="auth-box p-0 w-100">
  <div class="row w-100 g-0">
    <div class="col">
      <div class="h-100 position-relative card-side-img rounded-0 overflow-hidden" style="background-image: url('assets/images/auth.jpg')">
        <div class="p-4 card-img-overlay auth-overlay d-flex align-items-end justify-content-center"></div>
      </div>
    </div>

    <div class="col-xl-auto">
      <div class="card auth-box-form border-0 mb-0">
        <div class="card-body min-vh-100 d-flex flex-column justify-content-center">
          <div class="auth-brand mb-0 text-center">
            <a routerLink="/" class="logo-dark">
              <img src="assets/images/logo-black.png" alt="dark logo" />
            </a>
            <a routerLink="/" class="logo-light">
              <img src="assets/images/logo.png" alt="logo" />
            </a>
          </div>

          <div class="mt-auto text-center">
            <h4 class="fw-bold">Welcome to Admin</h4>
            <p class="text-muted mx-auto mb-5">This screen is locked. Enter your PIN to continue.</p>

            <div class="text-center mb-4">
              <img src="assets/images/users/user-1.jpg" class="rounded-circle img-thumbnail avatar-xxl mb-2" alt="thumbnail" />
              <h5 class="fs-md">{{ username }}</h5>
            </div>

            <form>
              <label class="form-label d-flex">
                Enter your 6-digit code
                <span class="text-danger">*</span>
              </label>
              <div class="d-flex gap-2 mb-3 two-factor">
                <div class="otp-page">
                  <ng-otp-input [config]="{ length: 6, allowNumbersOnly:true, inputClass:'form-control py-2 bg-light bg-opacity-40 border-light text-center otp-input',}"> </ng-otp-input>
                </div>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary fw-semibold py-2">Confirm</button>
              </div>
            </form>
          </div>

          <p class="text-muted text-center mt-4 mb-0">
            Not you? Return to
            <a routerLink="/auth/split/sign-in" class="text-decoration-underline link-offset-3 fw-semibold">Sign in</a>
          </p>

          <p class="text-center text-muted mt-auto mb-0">
            © {{ currentYear }} {{ name }} — by
            <span class="fw-bold">{{ author }}</span>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
