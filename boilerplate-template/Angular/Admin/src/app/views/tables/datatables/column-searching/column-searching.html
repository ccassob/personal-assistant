<div class="container-fluid">
  <app-page-breadcrumb title="Column Searching" subTitle="DataTables" />
  <div class="row justify-content-center">
    <div class="col-xxl-10">
      <div class="card">
        <div class="card-header justify-content-between">
          <h4 class="card-title">Example</h4>
          <a href="https://datatables.net/examples/api/multi_filter.html" target="_blank" class="icon-link icon-link-hover link-primary fw-semibold">
            View Docs
            <app-icon icon="arrow-right" class="bi align-middle fs-lg"></app-icon>
          </a>
        </div>

        <div class="card-body">
          @if(showAlert){
          <ngb-alert type="warning" [dismissible]="true" (closed)="showAlert = false" class="mb-4">
            <strong>Note:</strong>
            This is a jQuery-based plugin, so you need to include jQuery for it to work.
          </ngb-alert>
          }
          <table datatable [dtOptions]="dtOptions" id="column-search-data" class="table dt-responsive align-middle mb-0">
            <thead class="thead-sm text-uppercase fs-xxs">
              <tr>
                @for (header of tableData.header; track $index; let last = $last) {
                <th>{{ header }}</th>
                }
              </tr>
              <tr id="column-search-inputs" class="column-search-input-bar">
                <th>
                  <input type="text" placeholder="Company" class="form-control form-control-sm bg-light-subtle border-light" />
                </th>
                <th>
                  <input type="text" placeholder="Symbol" class="form-control form-control-sm bg-light-subtle border-light" />
                </th>
                <th>
                  <input type="text" placeholder="Price" class="form-control form-control-sm bg-light-subtle border-light" />
                </th>
                <th>
                  <input type="text" placeholder="Change" class="form-control form-control-sm bg-light-subtle border-light" />
                </th>
                <th>
                  <input type="text" placeholder="Volume" class="form-control form-control-sm bg-light-subtle border-light" />
                </th>
                <th>
                  <input type="text" placeholder="Market Cap" class="form-control form-control-sm bg-light-subtle border-light" />
                </th>
                <th>
                  <input type="text" placeholder="Rating" class="form-control form-control-sm bg-light-subtle border-light" />
                </th>
                <th>
                  <input type="text" placeholder="Status" class="form-control form-control-sm bg-light-subtle border-light" />
                </th>
              </tr>
            </thead>
          </table>
        </div>
      </div>
      <!-- end card-->
    </div>
  </div>
</div>
