<div class="container-fluid">
  <app-page-breadcrumb title="Range Search" subTitle="Datatables" />
  <div class="row justify-content-center">
    <div class="col-xxl-10">
      <div class="card">
        <div class="card-header justify-content-between">
          <h4 class="card-title">Example</h4>
          <a href="https://datatables.net/examples/plug-ins/range_filtering.html" target="_blank" class="icon-link icon-link-hover link-primary fw-semibold">
            View Docs
            <app-icon icon="arrow-right" class="bi align-middle fs-lg"></app-icon>
          </a>
        </div>

        <div class="card-body">
          @if(showAlert){
          <ngb-alert type="warning" [dismissible]="true" (closed)="showAlert = false" class="mb-4">
            <strong>Note:</strong>
            This is a jQuery-based plugin, so you need to include jQuery for it to work.
          </ngb-alert>
          }
          <div class="d-inline-flex align-items-center gap-2 range-filter">
            <label class="fw-semibold">Price:</label>
            <input type="text" class="form-control form-control-sm" placeholder="Min" [(ngModel)]="minPrice" (input)="onRangeChange()" />
            <input type="text" class="form-control form-control-sm" placeholder="Max" [(ngModel)]="maxPrice" (input)="onRangeChange()" />
          </div>

          <table datatable [dtOptions]="dtOptions" id="range-search-data" class="table table-striped dt-responsive align-middle mb-0 mt-n4"></table>
        </div>
      </div>
    </div>
  </div>
</div>
