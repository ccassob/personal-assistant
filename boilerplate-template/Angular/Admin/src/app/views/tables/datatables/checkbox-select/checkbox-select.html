<div class="container-fluid">
  <app-page-breadcrumb title="Checkbox Select" subTitle="Datatables" />
  <div class="row justify-content-center">
    <div class="col-xxl-10">
      <div class="card">
        <div class="card-header justify-content-between">
          <h4 class="card-title">Example</h4>
          <a href="https://datatables.net/extensions/select/examples/checkbox/checkbox.html" target="_blank" class="icon-link icon-link-hover link-primary fw-semibold">
            View Docs
            <app-icon icon="arrow-right" class="bi align-middle fs-lg"></app-icon>
          </a>
        </div>

        <div class="card-body">
          @if(showAlert){
          <ngb-alert type="warning" [dismissible]="true" (closed)="showAlert = false" class="mb-4">
            <strong>Note:</strong>
            This is a jQuery-based plugin, so you need to include jQuery for it to work.
          </ngb-alert>
          }
          <table datatable [dtOptions]="dtOptions" id="checkbox-select-data" class="table table-striped dt-responsive checkbox-select-datatable align-middle mb-0">
            <thead class="thead-sm text-uppercase fs-xxs">
              <tr>
                <th class="fs-sm" style="width: 1%"><input #selectAllRef type="checkbox" class="form-check-input" /></th>
                <th>Company</th>
                <th>Symbol</th>
                <th>Price</th>
                <th>Change</th>
                <th>Volume</th>
                <th>Market Cap</th>
                <th>Rating</th>
                <th>Status</th>
              </tr>
            </thead>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
