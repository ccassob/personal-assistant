@if (isOpen) {
<ngb-alert [dismissible]="false" type="primary" class="top-alert text-center mb-0 rounded-0" role="alert">
  <button type="button" class="btn-close btn-close-white float-end" aria-label="Close" (click)="closeAlert()"></button>
  <div class="fst-italic fw-medium">
    🚀 INSPINIA 5.x is here! Now with Bootstrap 5, dark mode, and a refreshed UI. Upgrade today for the best experience!
    <a [href]="buyUrl" target="_blank" class="fw-semibold fst-normal text-white text-decoration-underline link-offset-3 ms-2">Buy Now!</a>
  </div>
</ngb-alert>
}
<header>
  <!-- Nav START -->
  <nav class="navbar navbar-expand-lg py-3 sticky-top {{ isSticky ? 'top-scroll-up top-fixed' : '' }}" id="landing-navbar">
    <div class="container">
      <div class="auth-brand mb-0">
        <a routerLink="/" class="logo-dark">
          <img src="assets/images/logo-black.png" alt="dark logo" height="32" />
        </a>
        <a routerLink="/" class="logo-light">
          <img src="assets/images/logo.png" alt="logo" height="32" />
        </a>
      </div>
      <button class="navbar-toggler" type="button" (click)="isCollapsed = !isCollapsed" [attr.aria-expanded]="!isCollapsed" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div [ngbCollapse]="isCollapsed" class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav fw-medium gap-2 fs-sm mx-auto mt-2 mt-lg-0" id="navbar-example">
          @for (item of navItems; track $index) {
          <li class="nav-item">
            <a class="nav-link" [class.active]="scroll.activeSection === item.toLowerCase()" (click)="scroll.scrollTo(item)" href="javascript:void(0)">{{ item }}</a>
          </li>
          }
        </ul>

        <div>
          <button class="btn btn-link btn-icon fw-semibold text-body" type="button" id="theme-toggle" (click)="toggleTheme()">
            <iconify-icon icon="tabler:contrast" class="fs-22"></iconify-icon>
          </button>
          <a routerLink="/auth/sign-in" class="btn btn-link fw-semibold text-body ps-2">SIGN IN</a>
          <a routerLink="/auth/sign-up" class="btn btn-sm btn-primary">Sign Up</a>
        </div>
      </div>
      <!-- end .navbar-collapse-->
    </div>
    <!-- end container-->
  </nav>
  <!-- Nav END -->
</header>
