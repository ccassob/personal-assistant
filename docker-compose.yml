services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: [
        "CMD",
        "/opt/mssql-tools18/bin/sqlcmd",
        "-S", "localhost",
        "-U", "sa",
        "-P", "${SA_PASSWORD}",
        "-C",
        "-Q", "SELECT 1"
      ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build: ./backend/dotnet/budget-api
    depends_on:
      sql:
        condition: service_healthy
    ports:
      - "5085:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sql,1433;Database=BudgetApp;User Id=sa;Password=${SA_PASSWORD};Encrypt=False;TrustServerCertificate=True;"
      Jwt__Key: "${JWT_KEY}"

  frontend:
    build: ./frontend/angular/budget-front
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  mssql-data:
