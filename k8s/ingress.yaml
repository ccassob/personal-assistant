apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: personal-assistant
  namespace: personal-assistant
spec:
  ingressClassName: nginx
  rules:
    - host: personal-assistant.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
